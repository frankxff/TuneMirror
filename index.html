    const HISTORY_KEY = 'vocal_pitch_analyzer_history';

    function loadHistory() {
        try {
            const value = JSON.parse(localStorage.getItem(HISTORY_KEY));
            return Array.isArray(value) ? value : [];
        } catch (_) {
            return [];
        }
    }

    function escapeHTML(value) {
        return String(value).replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    function saveToHistory(resultData) {
        let history = loadHistory();
        const advisory = getAdvisoryForRecord(resultData);
        
        // 构建要保存的轻量化数据 (舍弃庞大的 rawCents 数组)
        const record = {
            id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            date: new Date().toLocaleString('zh-CN', { hour12: false }),
            name: resultData.name,
            score: resultData.score,
            rmsd: resultData.rmsd,
            rate: resultData.rate,
            mad: resultData.mad,
            median: resultData.median,
            p80: resultData.p80,
            p95: resultData.p95,
            stability: resultData.stability,
            confidence: resultData.confidence,
            evaluatedFrames: resultData.evaluatedFrames,
            frames: resultData.frames,
            voicedFrames: resultData.voicedFrames,
            candidateFrames: resultData.candidateFrames,
            stableFrames: resultData.stableFrames,
            tuningProbability: advisory.tuningProbability,
            lipSyncProbability: advisory.lipSyncProbability,
            advisoryLevel: advisory.level,
            boxplot: resultData.boxplot || (resultData.rawCents ? calculateBoxplotStats(resultData.rawCents) : null)
        };
        
        history.unshift(record);

        try {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 200)));
            return true;
        } catch (err) {
            console.warn('历史记录保存失败', err);
            return false;
        }
    }

                    <div class="history-head">

    // --------------------------------------------------------
    // 1. 将 Web Worker 的代码封装为字符串
    // --------------------------------------------------------
    const workerScript = `
        const PYIN_THRESHOLD_WEIGHTS = createPYINThresholdWeights();

        self.onmessage = function(e) {
            const { audioData, sampleRate, fileName } = e.data;
            const frameSize = 2048;
            const hopSize = 512;
            const processedAudio = preprocessAudioData(audioData);
            const totalFrames = processedAudio.length - frameSize;
            let candidateTrack = [];
            let voicedFrames = 0;
            let candidateFrames = 0;
            let confidenceSum = 0;

            if (totalFrames <= 0) {
                self.postMessage({ type: 'done', error: "音频过短，无法分析" });
                return;
            }
            
            let frameStats = [];
            let frameEnergies = [];
            for (let i = 0; i < processedAudio.length; i += hopSize) {
                const stats = calculateFrameStats(processedAudio.subarray(i, i + frameSize), i);
                frameStats.push(stats);
                frameEnergies.push(stats.rms);
            }
            const sortedEnergies = frameEnergies.slice().sort((a, b) => a - b);
            const noiseFloor = sortedEnergies[Math.floor(sortedEnergies.length * 0.35)] || 0;
            const highEnergy = sortedEnergies[Math.floor(sortedEnergies.length * 0.95)] || 0;
            const energyThreshold = Math.max(noiseFloor + (highEnergy - noiseFloor) * 0.18, highEnergy * 0.1, 0.0025);

            const maxPeriod = Math.ceil(sampleRate / 55);
            const minPeriod = Math.floor(sampleRate / 1200);

            let framesProcessed = 0;
            let lastReportTime = Date.now();

            for (const stats of frameStats) {
                if (stats.start > totalFrames) break;
                let frame = processedAudio.subarray(stats.start, stats.start + frameSize);
                const frameQuality = estimateVoicedFrameQuality(stats, energyThreshold, highEnergy);

                if (frameQuality.voicing >= 0.18) {
                    candidateFrames++;
                    let candidates = detectPitchCandidatesPYIN(frame, sampleRate, minPeriod, maxPeriod, frameQuality);
                    if (candidates.length > 0) {
                        candidateTrack.push({ time: stats.start / sampleRate, candidates });
                    }
                }

                framesProcessed++;
                
                if (Date.now() - lastReportTime > 50) {
                    self.postMessage({ type: 'progress', percent: ((stats.start / totalFrames) * 100).toFixed(1) });
                    lastReportTime = Date.now();
                }
            }

            const pitchTrack = smoothPitchTrack(candidateTrack);
            let centsDeviations = pitchTrack.map(point => point.cents);
            voicedFrames = pitchTrack.length;
            for (const point of pitchTrack) confidenceSum += point.confidence;

            if (centsDeviations.length === 0) {
                self.postMessage({ type: 'done', error: "未检测到有效人声" });
                return;
            }

            const allStats = calculatePitchStats(centsDeviations);
            const stableCents = collectStableCents(pitchTrack);
            const useStableFrames = stableCents.length >= Math.max(12, centsDeviations.length * 0.15);
            const evaluatedCents = useStableFrames ? stableCents : centsDeviations;
            const stableStats = useStableFrames ? calculatePitchStats(evaluatedCents) : allStats;

            let sumCents = 0, sumCentsSq = 0, inTuneCount = 0;
            for(let c of evaluatedCents) {
                sumCents += c;
                sumCentsSq += (c * c);
                if (c <= 20) inTuneCount++;
            }

            const detectionRate = voicedFrames / Math.max(1, candidateFrames);
            const averagePitchConfidence = confidenceSum / Math.max(1, voicedFrames);
            const rate20 = (inTuneCount / evaluatedCents.length) * 100;
            const detectionConfidence = clamp(Math.sqrt(detectionRate) * averagePitchConfidence, 0, 1);
            const accuracyScore = (
                centsQuality(stableStats.p50, 28) * 0.62 +
                centsQuality(stableStats.p80, 44) * 0.28 +
                centsQuality(stableStats.p95, 60) * 0.10
            );
            const coverageScore = rate20 * 0.60 + centsQuality(stableStats.p80, 45) * 0.40;
            const stabilityScore = centsQuality(stableStats.stddev, 42);
            const confidencePercent = detectionConfidence * 100;
            const confidencePenalty = confidencePercent >= 35 ? 0 : (35 - confidencePercent) * 0.10;
            const score = clamp(
                accuracyScore * 0.56 +
                coverageScore * 0.29 +
                stabilityScore * 0.15 -
                confidencePenalty +
                4,
                0,
                100
            );
            const rmsd = Math.sqrt(sumCentsSq / evaluatedCents.length);
            self.postMessage({
                type: 'done',
                result: {
                    name: fileName,
                    mad: (sumCents / evaluatedCents.length).toFixed(1),
                    rmsd: rmsd.toFixed(1),
                    median: stableStats.p50.toFixed(1),
                    p80: stableStats.p80.toFixed(1),
                    p95: stableStats.p95.toFixed(1),
                    stability: stableStats.stddev.toFixed(1),
                    rate: rate20.toFixed(1),
                    score: score.toFixed(1),
                    confidence: (detectionConfidence * 100).toFixed(1),
                    evaluatedFrames: evaluatedCents.length,
                    frames: centsDeviations.length,
                    voicedFrames,
                    candidateFrames,
                    stableFrames: stableCents.length,
                    rawCents: centsDeviations
                }
            });
        };

        function calculateRMS(buffer) {
            let rms = 0;
            for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
            return Math.sqrt(rms / buffer.length);
        }

        function preprocessAudioData(input) {
            const output = new Float32Array(input.length);
            let mean = 0;
            for (let i = 0; i < input.length; i++) mean += input[i];
            mean /= Math.max(1, input.length);

            let prevInput = 0;
            let prevOutput = 0;
            let peak = 0;
            for (let i = 0; i < input.length; i++) {
                const centered = input[i] - mean;
                const highPassed = centered - prevInput + 0.995 * prevOutput;
                const limited = Math.tanh(highPassed * 1.35);
                output[i] = limited;
                prevInput = centered;
                prevOutput = highPassed;
                if (Math.abs(limited) > peak) peak = Math.abs(limited);
            }

            if (peak > 0.0001 && peak < 0.95) {
                const gain = Math.min(2.5, 0.95 / peak);
                for (let i = 0; i < output.length; i++) output[i] *= gain;
            }
            return output;
        }

        function calculateFrameStats(buffer, start) {
            let sumSq = 0;
            let peak = 0;
            let zeroCrossings = 0;
            let previous = buffer[0] || 0;
            for (let i = 0; i < buffer.length; i++) {
                const value = buffer[i] || 0;
                sumSq += value * value;
                peak = Math.max(peak, Math.abs(value));
                if (i > 0 && ((value >= 0 && previous < 0) || (value < 0 && previous >= 0))) zeroCrossings++;
                previous = value;
            }
            const rms = Math.sqrt(sumSq / Math.max(1, buffer.length));
            return {
                start,
                rms,
                peak,
                crest: rms > 0 ? peak / rms : 0,
                zcr: zeroCrossings / Math.max(1, buffer.length - 1)
            };
        }

        function estimateVoicedFrameQuality(stats, energyThreshold, highEnergy) {
            if (stats.rms <= energyThreshold) return { voicing: 0 };
            if (stats.zcr > 0.32) return { voicing: 0 };
            const energyQuality = clamp((stats.rms - energyThreshold) / Math.max(0.0001, highEnergy - energyThreshold), 0, 1);
            const zcrQuality = 1 - clamp((stats.zcr - 0.1) / 0.22, 0, 1) * 0.75;
            const crestQuality = clamp((stats.crest - 1.05) / 1.1, 0, 1);
            const voicing = clamp((0.58 * energyQuality) + (0.28 * zcrQuality) + (0.14 * crestQuality), 0, 1);
            return { voicing, energyQuality, zcrQuality, crestQuality };
        }

        function detectPitchCandidatesPYIN(buf, sampleRate, minPeriod, maxPeriod, frameQuality) {
            const size = buf.length;
            const windowed = new Float32Array(size);
            let mean = 0;
            for (let i = 0; i < size; i++) mean += buf[i];
            mean /= size;

            for (let i = 0; i < size; i++) {
                const hann = 0.5 - 0.5 * Math.cos((2 * Math.PI * i) / (size - 1));
                windowed[i] = (buf[i] - mean) * hann;
            }

            const yin = new Float32Array(maxPeriod + 1);
            for (let tau = 1; tau <= maxPeriod; tau++) {
                let sum = 0;
                for (let i = 0; i < size - tau; i++) {
                    const delta = windowed[i] - windowed[i + tau];
                    sum += delta * delta;
                }
                yin[tau] = sum;
            }

            let runningSum = 0;
            yin[0] = 1;
            for (let tau = 1; tau <= maxPeriod; tau++) {
                runningSum += yin[tau];
                yin[tau] = runningSum === 0 ? 1 : yin[tau] * tau / runningSum;
            }

            const minima = [];
            for (let tau = minPeriod + 1; tau < maxPeriod; tau++) {
                if (yin[tau] <= yin[tau - 1] && yin[tau] < yin[tau + 1] && yin[tau] < 0.35) {
                    minima.push(tau);
                }
            }
            if (minima.length === 0) return [];

            const rawCandidates = [];
            for (const tau of minima) {
                let probability = 0;
                for (const entry of PYIN_THRESHOLD_WEIGHTS) {
                    if (yin[tau] <= entry.threshold) probability += entry.weight;
                }
                if (probability <= 0) continue;

                const betterTau = parabolicInterpolate(yin, tau);
                const frequency = sampleRate / betterTau;
                if (frequency < 55 || frequency > 1200) continue;

                const periodicity = calculatePeriodicity(windowed, tau);
                if (periodicity < 0.22) continue;

                const troughQuality = Math.max(0, 1 - yin[tau]);
                const earlyPeriodPrior = Math.pow(minPeriod / tau, 0.08);
                const candidateQuality = troughQuality * periodicity * clamp(frameQuality.voicing, 0, 1);
                rawCandidates.push({
                    frequency,
                    midi: 69 + 12 * Math.log2(frequency / 440),
                    probability: probability * candidateQuality * earlyPeriodPrior,
                    yin: yin[tau],
                    periodicity,
                    quality: candidateQuality
                });
            }

            if (rawCandidates.length === 0) return [];
            rawCandidates.sort((a, b) => b.probability - a.probability);

            const merged = [];
            for (const candidate of rawCandidates) {
                const existing = merged.find(item => Math.abs(item.midi - candidate.midi) < 0.18);
                if (existing) {
                    if (candidate.probability > existing.probability) {
                        existing.frequency = candidate.frequency;
                        existing.midi = candidate.midi;
                        existing.yin = candidate.yin;
                    }
                    existing.probability += candidate.probability;
                } else {
                    merged.push({ ...candidate });
                }
            }

            const total = merged.reduce((sum, candidate) => sum + candidate.probability, 0) || 1;
            return merged
                .map(candidate => {
                    const cents = Math.abs(candidate.midi - Math.round(candidate.midi)) * 100;
                    const probability = candidate.probability / total;
                    return {
                        frequency: candidate.frequency,
                        midi: candidate.midi,
                        cents: Math.min(50, cents),
                        confidence: clamp((0.5 + 0.5 * probability) * Math.sqrt(candidate.quality), 0, 1)
                    };
                })
                .filter(candidate => candidate.confidence >= 0.06)
                .sort((a, b) => b.confidence - a.confidence)
                .slice(0, 6);
        }

        function calculatePeriodicity(buffer, tau) {
            let cross = 0;
            let energyA = 0;
            let energyB = 0;
            for (let i = 0; i < buffer.length - tau; i++) {
                const a = buffer[i];
                const b = buffer[i + tau];
                cross += a * b;
                energyA += a * a;
                energyB += b * b;
            }
            if (energyA <= 1e-12 || energyB <= 1e-12) return 0;
            return clamp(cross / Math.sqrt(energyA * energyB), 0, 1);
        }

        function centsQuality(cents, tolerance) {
            return 100 * Math.exp(-Math.pow(Math.max(0, cents) / tolerance, 1.45));
        }

        function createPYINThresholdWeights() {
            const thresholds = [];
            const alpha = 2;
            const beta = 18;
            const minThreshold = 0.03;
            const maxThreshold = 0.32;
            let weightSum = 0;
            for (let i = 0; i < 32; i++) {
                const x = (i + 0.5) / 32;
                const threshold = minThreshold + (maxThreshold - minThreshold) * x;
                const weight = Math.pow(x, alpha - 1) * Math.pow(1 - x, beta - 1);
                thresholds.push({ threshold, weight });
                weightSum += weight;
            }
            return thresholds.map(entry => ({ threshold: entry.threshold, weight: entry.weight / weightSum }));
        }

        function smoothPitchTrack(candidateTrack) {
            const frames = candidateTrack.filter(frame => frame.candidates && frame.candidates.length > 0);
            if (frames.length === 0) return [];

            const transitionSigmaCents = 95;
            const gapPenaltyPerSecond = 0.35;
            const voicedThreshold = 0.16;
            let prevStates = [];

            for (let frameIndex = 0; frameIndex < frames.length; frameIndex++) {
                const frame = frames[frameIndex];
                const states = frame.candidates.map((candidate, candidateIndex) => ({
                    candidate,
                    candidateIndex,
                    score: Math.log(Math.max(candidate.confidence, 1e-6)),
                    backIndex: -1
                }));

                if (frameIndex > 0) {
                    const prevFrame = frames[frameIndex - 1];
                    const gapSeconds = Math.max(0, frame.time - prevFrame.time);
                    for (const state of states) {
                        let bestScore = -Infinity;
                        let bestIndex = -1;
                        for (let prevIndex = 0; prevIndex < prevStates.length; prevIndex++) {
                            const prevState = prevStates[prevIndex];
                            const jumpCents = Math.abs(state.candidate.midi - prevState.candidate.midi) * 100;
                            const transitionPenalty = Math.pow(jumpCents / transitionSigmaCents, 2) + gapSeconds * gapPenaltyPerSecond;
                            const score = prevState.score - transitionPenalty;
                            if (score > bestScore) {
                                bestScore = score;
                                bestIndex = prevIndex;
                            }
                        }
                        state.score += bestScore;
                        state.backIndex = bestIndex;
                    }
                }

                frame.states = states;
                prevStates = states;
            }

            const lastFrame = frames[frames.length - 1];
            let bestFinalIndex = 0;
            for (let i = 1; i < lastFrame.states.length; i++) {
                if (lastFrame.states[i].score > lastFrame.states[bestFinalIndex].score) bestFinalIndex = i;
            }

            const selected = [];
            let selectedIndex = bestFinalIndex;
            for (let frameIndex = frames.length - 1; frameIndex >= 0; frameIndex--) {
                const state = frames[frameIndex].states[selectedIndex];
                const confidence = clamp(state.candidate.confidence, 0, 1);
                if (confidence >= voicedThreshold) {
                    selected.push({
                        time: frames[frameIndex].time,
                        midi: state.candidate.midi,
                        cents: state.candidate.cents,
                        confidence
                    });
                }
                selectedIndex = state.backIndex;
                if (selectedIndex < 0 && frameIndex > 0) selectedIndex = 0;
            }

            return medianSmoothPitchTrack(selected.reverse());
        }

        function medianSmoothPitchTrack(track) {
            if (track.length < 5) return track;
            return track.map((point, index) => {
                const start = Math.max(0, index - 2);
                const end = Math.min(track.length, index + 3);
                const localMidi = track.slice(start, end).map(item => item.midi).sort((a, b) => a - b);
                const medianMidi = localMidi[Math.floor(localMidi.length / 2)];
                if (Math.abs(point.midi - medianMidi) > 0.45) {
                    const cents = Math.abs(medianMidi - Math.round(medianMidi)) * 100;
                    return {
                        ...point,
                        midi: medianMidi,
                        cents: Math.min(50, cents),
                        confidence: point.confidence * 0.92
                    };
                }
                return point;
            });
        }

        function parabolicInterpolate(values, index) {
            if (index <= 1 || index >= values.length - 1) return index;
            const left = values[index - 1];
            const center = values[index];
            const right = values[index + 1];
            const divisor = left - 2 * center + right;
            if (Math.abs(divisor) < 1e-12) return index;
            return index + 0.5 * (left - right) / divisor;
        }

        function calculatePitchStats(values) {
            const sorted = values.slice().sort((a, b) => a - b);
            const mean = sorted.reduce((sum, value) => sum + value, 0) / sorted.length;
            let variance = 0;
            for (const value of sorted) variance += (value - mean) * (value - mean);
            return {
                p50: percentile(sorted, 0.5),
                p80: percentile(sorted, 0.8),
                p95: percentile(sorted, 0.95),
                stddev: Math.sqrt(variance / sorted.length)
            };
        }

        function percentile(sortedValues, ratio) {
            if (sortedValues.length === 1) return sortedValues[0];
            const index = (sortedValues.length - 1) * ratio;
            const lower = Math.floor(index);
            const upper = Math.ceil(index);
            if (lower === upper) return sortedValues[lower];
            return sortedValues[lower] + (sortedValues[upper] - sortedValues[lower]) * (index - lower);
        }

        function collectStableCents(track) {
            if (track.length < 3) return track.map(point => point.cents);
            const stable = [];
            for (let i = 1; i < track.length - 1; i++) {
                const prev = track[i - 1];
                const curr = track[i];
                const next = track[i + 1];
                const localSlope = Math.max(
                    Math.abs(curr.midi - prev.midi),
                    Math.abs(next.midi - curr.midi)
                ) * 100;
                if (localSlope <= 35) stable.push(curr.cents);
            }
            return stable;
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }
    `;

        const selected = history.filter(item => selectedHistoryIds.has(String(item.id)));
        return selected.map(item => normalizeHistoryRecord(item));

    function normalizeHistoryRecord(item) {
        const advisory = getAdvisoryForRecord(item);
        return {
            ...item,
            tuningProbability: advisory.tuningProbability,
            lipSyncProbability: advisory.lipSyncProbability,
            advisoryLevel: advisory.level,
            boxplot: normalizeBoxplot(item.boxplot)
        };

    function normalizeBoxplot(value) {
        if (!Array.isArray(value) || value.length !== 5) return null;
        const numbers = value.map(Number);
        return numbers.every(Number.isFinite) ? numbers : null;

    function getCurrentSortMetric() {
        const mode = chartModeSelect.value;
        return METRIC_CONFIG[mode] ? mode : 'score';
    }

    function getCurrentSortLabel() {
        const metric = getCurrentSortMetric();
        return METRIC_CONFIG[metric] ? METRIC_CONFIG[metric].label : L.score;
    }

    function getSortedCompareRecords() {
        const records = currentCompareRecords.filter(Boolean);
        if (currentCompareSource !== 'history' || records.length < 2) return records;
        const metric = getCurrentSortMetric();
        const direction = historySortDirection === 'asc' ? 1 : -1;
        return records.slice().sort((a, b) => {
            const diff = toNumber(a[metric]) - toNumber(b[metric]);
            if (diff !== 0) return diff * direction;
            return String(a.name || '').localeCompare(String(b.name || ''), 'zh-CN');
        });
    }

    function showTooltip(target) {
        const tip = target.getAttribute('data-tip');
        if (!tip) return;
        globalTooltip.textContent = tip;
        globalTooltip.classList.add('is-visible');
        const iconRect = target.getBoundingClientRect();
        const tipRect = globalTooltip.getBoundingClientRect();
        const margin = 10;
        let left = iconRect.left + (iconRect.width / 2) - (tipRect.width / 2);
        let top = iconRect.top - tipRect.height - margin;
        left = Math.max(8, Math.min(left, window.innerWidth - tipRect.width - 8));
        if (top < 8) top = iconRect.bottom + margin;
        globalTooltip.style.left = `${left}px`;
        globalTooltip.style.top = `${top}px`;
    }

    function hideTooltip() {
        globalTooltip.classList.remove('is-visible');

    analyzeBtn.addEventListener('click', async () => {
        analyzeBtn.disabled = true;
        resultsContainer.innerHTML = '';
        advisoryContainer.innerHTML = '';
        myChart.clear();
        progressContainer.style.display = 'block';
        
        let successfulResults = [];
        let historySaveFailed = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            const shortName = file.name.length > 12 ? file.name.substring(0, 10) + '...' : file.name;
            const safeShortName = escapeHTML(shortName);
            
            statusText.innerHTML = L.decoding(safeShortName);
            statusText.style.color = "var(--primary)";
            progressBar.style.width = '0%';

            try {
                const arrayBuffer = await file.arrayBuffer();
                const originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const targetSampleRate = 22050;
                const offlineCtx = new OfflineAudioContext(1, Math.ceil(originalBuffer.duration * targetSampleRate), targetSampleRate);
                const source = offlineCtx.createBufferSource();
                source.buffer = originalBuffer;
                source.connect(offlineCtx.destination);
                source.start();
                const downsampledBuffer = await offlineCtx.startRendering();
                const audioData = downsampledBuffer.getChannelData(0);

                statusText.innerHTML = L.analyzing(safeShortName);

                const result = await new Promise((resolve, reject) => {
                    const worker = new Worker(workerUrl);
                    worker.onmessage = (e) => {
                        if (e.data.type === 'progress') {
                            progressBar.style.width = `${e.data.percent}%`;
                        } else if (e.data.type === 'done') {
                            worker.terminate();
                            resolve(e.data);
                        }
                    };
                    worker.onerror = (err) => {
                        worker.terminate();
                        reject(err);
                    };
                    worker.postMessage({ audioData, sampleRate: targetSampleRate, fileName: file.name });
                });

                if(!result.error) {
                    result.result.boxplot = calculateBoxplotStats(result.result.rawCents);
                    const advisory = estimateAuthenticityAdvisory(result.result);
                    result.result.tuningProbability = advisory.tuningProbability;
                    result.result.lipSyncProbability = advisory.lipSyncProbability;
                    result.result.advisoryLevel = advisory.level;
                    renderResultCard(result.result);
                    // --- 核心新增：将成功的数据保存到本地历史记录 ---
                    if (!saveToHistory(result.result)) historySaveFailed = true;
                    
                    successfulResults.push(result.result);
                } else {
                    renderErrorCard(file.name, localizeAnalysisError(result.error));
                }

            } catch (err) {
                console.error(err);
                renderErrorCard(file.name, L.decodeFailed);
            }
        }

        if(successfulResults.length > 0) {
            currentCompareRecords = successfulResults;
            currentCompareSource = 'current';
            updateHistorySortControl();
            chartModeSelect.value = 'boxplot';
            renderCompareChart();
        } else {
            currentCompareRecords = [];
            currentCompareSource = 'current';
            updateHistorySortControl();
            renderNoDataAdvisory();
            renderCompareChart();
        }

        statusText.innerHTML = historySaveFailed ? L.doneStorageLow : L.done;
        statusText.style.color = historySaveFailed ? "var(--warning)" : "var(--success)";
        progressContainer.style.display = 'none';
        analyzeBtn.disabled = false;
    });

        return 76;

    function getChartGridOptions(labelCount, right = 32) {
        return {
            left: 56,
            right,
            top: 42,
            height: 282,
            containLabel: false
        };
    }

    function syncChartHeightForXAxis(labelCount) {
        showChartCanvas();
        const baseHeight = 400;
        const baseGridBottom = 76;
        const extraLabelSpace = Math.max(0, getChartGridBottom(labelCount) - baseGridBottom);
        const chartContainer = document.getElementById('chartContainer');
        chartContainer.style.height = `${baseHeight + extraLabelSpace}px`;
        myChart.resize();
    }

    function resetChartHeight() {
        showChartCanvas();
        const chartContainer = document.getElementById('chartContainer');
        if (chartContainer.style.height !== '400px') {
            chartContainer.style.height = '400px';
            myChart.resize();
        }
    }

    function showChartCanvas() {
        if (chartFrame.classList.contains('is-empty')) {
            chartFrame.classList.remove('is-empty');
            myChart.resize();
        }
    }

    function showChartEmpty(message = L.noData) {
        chartEmptyState.textContent = message;
        chartFrame.classList.add('is-empty');
        myChart.clear();
    }

    function renderNoDataChart() {
        showChartEmpty(L.noData);
    }

    function renderCompareChart() {
        const records = getSortedCompareRecords();
        const mode = chartModeSelect.value;
        updateHistorySortControl();

        if (records.length === 0) {
            chartTitle.textContent = L.chartCompareTitle;
            chartHint.textContent = L.chartCompareHint;
            renderNoDataChart();
            return;
        }

        if (mode === 'boxplot') {
            renderBoxplotChart(records);
        } else if (mode === 'radar') {
            renderRadarChart(records);
        } else {
            renderMetricChart(records, mode);
        }
    }

    function renderBoxplotChart(records) {
        const boxplotRecords = records.filter(item => Array.isArray(item.boxplot) && item.boxplot.length === 5);
        chartTitle.textContent = currentCompareSource === 'history' ? L.historyBoxTitle : L.currentBoxTitle;
        chartHint.textContent = boxplotRecords.length === records.length ? L.chartHintBox : L.missingBoxHint;

        if (boxplotRecords.length === 0) {
            renderEmptyChart(L.missingBox);
            return;
        }

        const labels = boxplotRecords.map(item => formatChartLabel(item.name));
        syncChartHeightForXAxis(labels.length);
        myChart.clear();
        myChart.setOption({
            tooltip: {
                trigger: 'item',
                axisPointer: { type: 'shadow' },
                confine: true,
                formatter: (params) => {
                    const item = boxplotRecords[params.dataIndex] || {};
                    return `${escapeHTML(item.name || params.name)}<br/>${escapeHTML(L.score)}: ${escapeHTML(item.score || '-')}`;
                }
            },
            grid: getChartGridOptions(labels.length, 72),
            xAxis: { type: 'category', data: labels, boundaryGap: true, axisLabel: getChartXAxisLabelOptions(labels.length) },
            yAxis: { type: 'value', name: L.deviationAxis, max: 55, splitLine: { lineStyle: { type: 'dashed' } } },
            series: [{
                name: L.pitchDeviation, type: 'boxplot', data: boxplotRecords.map(item => item.boxplot),
                itemStyle: { color: 'rgba(79, 70, 229, 0.2)', borderColor: '#4f46e5', borderWidth: 2 },
                markLine: {
                    data: [ { yAxis: 10, name: L.excellentPitch, lineStyle: { color: '#10b981', type: 'dashed' } }, { yAxis: 20, name: L.goodPitch, lineStyle: { color: '#f59e0b', type: 'dashed' } } ],
                    label: { formatter: '{b}' }
                }
            }]
        });
    }

    const METRIC_CONFIG = {
        score: { label: L.score, unit: L.points, max: 100, higherBetter: true },
        rate: { label: L.rate, unit: '%', max: 100, higherBetter: true },
        median: { label: L.median, unit: L.cents, max: 55, higherBetter: false },
        p80: { label: L.p80, unit: L.cents, max: 55, higherBetter: false },
        p95: { label: L.p95, unit: L.cents, max: 55, higherBetter: false },
        stability: { label: L.stability, unit: '', max: 55, higherBetter: false },
        confidence: { label: L.confidence, unit: '%', max: 100, higherBetter: true },
        tuningProbability: { label: L.tuningProbability, unit: '%', max: 100, higherBetter: false },
        lipSyncProbability: { label: L.lipSyncProbability, unit: '%', max: 100, higherBetter: false }
    };

    function renderMetricChart(records, metricKey) {
        const config = METRIC_CONFIG[metricKey] || METRIC_CONFIG.score;
        const labels = records.map(item => formatChartLabel(item.name));
        const values = records.map(item => toNumber(item[metricKey]));
        chartTitle.textContent = LANG === 'zh' ? `📊 ${config.label}对比` : `📊 ${config.label} comparison`;
        chartHint.textContent = config.higherBetter ? L.higherBetter : L.lowerBetter;

        syncChartHeightForXAxis(labels.length);
        myChart.clear();
        myChart.setOption({
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                confine: true,
                formatter: (params) => {
                    const param = params[0] || {};
                    const item = records[param.dataIndex] || {};
                    return `${escapeHTML(item.name || param.name)}<br/>${config.label}: ${escapeHTML(param.value ?? '-')}${config.unit}`;
                }
            },
            grid: getChartGridOptions(labels.length),
            xAxis: { type: 'category', data: labels, axisLabel: getChartXAxisLabelOptions(labels.length) },
            yAxis: { type: 'value', name: config.unit ? `${config.label} (${config.unit})` : config.label, max: config.max, splitLine: { lineStyle: { type: 'dashed' } } },
            series: [{
                name: config.label,
                type: 'bar',
                data: values,
                barMaxWidth: 38,
                itemStyle: { color: config.higherBetter ? '#4f46e5' : '#f59e0b', borderRadius: [4, 4, 0, 0] },
                label: { show: true, position: 'top', formatter: `{c}${config.unit}` }
            }]
        });
    }

    function renderRadarChart(records) {
        chartTitle.textContent = currentCompareSource === 'history' ? L.historyRadar : L.currentRadar;
        chartHint.textContent = L.radarHint;
        resetChartHeight();
        const indicators = [
            { name: L.radarScore, max: 100 },
            { name: L.radarRate, max: 100 },
            { name: L.radarConfidence, max: 100 },
            { name: L.radarMedian, max: 100 },
            { name: L.radarP80, max: 100 },
            { name: L.radarStability, max: 100 }
        ];
        const seriesData = records.map(item => ({
            name: item.name,
            value: [
                clampNumber(toNumber(item.score), 0, 100),
                clampNumber(toNumber(item.rate), 0, 100),
                clampNumber(toNumber(item.confidence), 0, 100),
                centsToQuality(item.median),
                centsToQuality(item.p80),
                centsToQuality(item.stability, 3)
            ]
        }));

        myChart.clear();
        myChart.setOption({
            tooltip: { trigger: 'item', confine: true },
            legend: { type: 'scroll', bottom: 0, data: records.map(item => item.name) },
            radar: {
                indicator: indicators,
                radius: '62%',
                center: ['50%', '45%'],
                splitLine: { lineStyle: { color: '#e2e8f0' } },
                splitArea: { areaStyle: { color: ['#ffffff', '#f8fafc'] } },
                axisName: { color: '#475569' }
            },
            series: [{
                type: 'radar',
                data: seriesData,
                symbolSize: 4,
                areaStyle: { opacity: 0.08 },
                lineStyle: { width: 2 }
            }]
        });
    }

    function renderEmptyChart(message) {
        showChartEmpty(message);
    }

    function toNumber(value) {
        const num = Number(value);
        return Number.isFinite(num) ? num : 0;
    }

    function centsToQuality(value, weight = 2) {
        return clampNumber(100 - toNumber(value) * weight, 0, 100);
    }

    function clampNumber(value, min, max) {
        return Math.max(min, Math.min(max, value));
    }

    function renderResultCard(data) {
        const scoreClass = data.score === undefined || data.score === null || data.score === '' ? '' : (data.score >= 80 ? 'score-high' : (data.score >= 60 ? 'score-mid' : 'score-low'));
        const safeName = escapeHTML(data.name);
        const score = formatMetricValue(data.score);
        const rate = formatMetricValue(data.rate);
        const confidence = formatMetricValue(data.confidence);
        resultsContainer.insertAdjacentHTML('beforeend', `
            <div class="result-item">
                <h3 title="${safeName}">${safeName}</h3>
                <div class="stat-grid">
                    ${renderStatBox(L.score, score, tr('metricTips.score'), scoreClass)}
                    ${renderStatBox(`${L.rate} (≤20${L.cents})`, formatPercentValue(rate), tr('metricTips.rate'), '', 'color:var(--primary);')}
                    ${renderStatBox(L.mad, formatMetricValue(data.mad), tr('metricTips.mad'))}
                    ${renderStatBox(L.rmsd, formatMetricValue(data.rmsd), tr('metricTips.rmsd'))}
                    ${renderStatBox(L.median, formatMetricValue(data.median), tr('metricTips.median'))}
                    ${renderStatBox(L.p80, formatMetricValue(data.p80), tr('metricTips.p80'))}
                    ${renderStatBox(L.p95, formatMetricValue(data.p95), tr('metricTips.p95'))}
                    ${renderStatBox(L.stability, formatMetricValue(data.stability), tr('metricTips.stability'))}
                    ${renderStatBox(L.confidence, formatPercentValue(confidence), tr('metricTips.confidence'))}
                    ${renderStatBox(L.evaluatedFrames, formatMetricValue(data.evaluatedFrames), tr('metricTips.evaluatedFrames'), '', 'color:#64748b;', 'is-secondary')}
                    ${renderStatBox(L.frames, formatMetricValue(data.frames), tr('metricTips.frames'), '', 'color:#64748b;', 'is-secondary')}
                    ${renderStatBox(L.voicedFrames, formatMetricValue(data.voicedFrames), tr('metricTips.voicedFrames'), '', 'color:#64748b;', 'is-secondary')}
                    ${renderStatBox(L.candidateFrames, formatMetricValue(data.candidateFrames), tr('metricTips.candidateFrames'), '', 'color:#64748b;', 'is-secondary')}
                    ${renderStatBox(L.stableFrames, formatMetricValue(data.stableFrames), tr('metricTips.stableFrames'), '', 'color:#64748b;', 'is-secondary')}
                </div>
            </div>
        `);
        renderAdvisoryCard(data);
    }

    function renderNoDataAdvisory() {
        advisoryContainer.innerHTML = `<div class="empty-state">${escapeHTML(L.noData)}</div>`;
    }

    function renderAdvisoryCard(data) {
        const advisory = getAdvisoryForRecord(data);
        const safeName = escapeHTML(data.name || L.unnamed);
        advisoryContainer.insertAdjacentHTML('beforeend', `
            <div class="advisory-item">
                <div class="advisory-head">
                    <div class="advisory-name">${safeName}</div>
                    <div class="advisory-level">${escapeHTML(advisory.level)}</div>
                </div>
                <div class="advisory-grid">
                    <div class="advisory-prob">
                        <div class="advisory-label">${escapeHTML(L.tuningProbability)}</div>
                        <div class="advisory-value ${advisory.tuningClass}">${formatAdvisoryPercent(advisory.tuningProbability)}</div>
                    </div>
                    <div class="advisory-prob">
                        <div class="advisory-label">${escapeHTML(L.lipSyncProbability)}</div>
                        <div class="advisory-value ${advisory.lipSyncClass}">${formatAdvisoryPercent(advisory.lipSyncProbability)}</div>
                    </div>
                </div>
                <div class="advisory-note">${renderAdvisoryNote(advisory)}</div>
            </div>
        `);
    }

    function getAdvisoryForRecord(data) {
        if (
            data &&
            data.tuningProbability !== undefined &&
            data.lipSyncProbability !== undefined
        ) {
            const tuningProbability = Math.round(toNumber(data.tuningProbability));
            const lipSyncProbability = Math.round(toNumber(data.lipSyncProbability));
            const maxProbability = Math.max(tuningProbability, lipSyncProbability);
            const metrics = {
                score: toNumber(data.score),
                median: toNumber(data.median),
                p80: toNumber(data.p80),
                p95: toNumber(data.p95),
                stability: toNumber(data.stability),
                rate: toNumber(data.rate),
                confidence: toNumber(data.confidence),
                stableRatio: toNumber(data.voicedFrames) > 0 ? clampNumber(toNumber(data.stableFrames) / toNumber(data.voicedFrames), 0, 1) : 0,
                evaluatedFrames: toNumber(data.evaluatedFrames)
            };
            const hasMetrics = hasAdvisoryMetrics(data);
            return {
                tuningProbability,
                lipSyncProbability,
                tuningClass: getProbabilityClass(tuningProbability),
                lipSyncClass: getProbabilityClass(lipSyncProbability),
                level: getAdvisoryBand(maxProbability),
                tuningNote: hasMetrics ? buildTuningNote(metrics, tuningProbability) : tr('notes.tuningMissing'),
                lipSyncNote: hasMetrics ? buildLipSyncNote(metrics, lipSyncProbability) : tr('notes.lipMissing'),
                finalNote: L.advisoryFinal
            };
        }
        if (!hasAdvisoryMetrics(data)) return createEmptyAdvisory();
        return estimateAuthenticityAdvisory(data || {});
    }

    function estimateAuthenticityAdvisory(data) {
        if (!hasAdvisoryMetrics(data)) return createEmptyAdvisory();
        const score = toNumber(data.score);
        const rate = toNumber(data.rate);
        const median = toNumber(data.median);
        const p80 = toNumber(data.p80);
        const p95 = toNumber(data.p95);
        const stability = toNumber(data.stability);
        const confidence = toNumber(data.confidence);
        const evaluatedFrames = toNumber(data.evaluatedFrames);
        const voicedFrames = toNumber(data.voicedFrames);
        const stableFrames = toNumber(data.stableFrames);
        const frameCountFactor = clampNumber(evaluatedFrames / 80, 0, 1);
        const stableRatio = voicedFrames > 0 ? clampNumber(stableFrames / voicedFrames, 0, 1) : 0;

        let tuningProbability =
            centsToSuspicion(median, 6, 18) * 0.28 +
            centsToSuspicion(p80, 10, 28) * 0.20 +
            centsToSuspicion(p95, 18, 42) * 0.12 +
            inverseSuspicion(stability, 4, 18) * 0.18 +
            clampNumber((rate - 78) / 22, 0, 1) * 100 * 0.14 +
            stableRatio * 100 * 0.08;

        let lipSyncProbability =
            inverseSuspicion(stability, 3, 16) * 0.24 +
            clampNumber((score - 86) / 14, 0, 1) * 100 * 0.18 +
            clampNumber((rate - 85) / 15, 0, 1) * 100 * 0.16 +
            centsToSuspicion(median, 7, 20) * 0.14 +
            clampNumber((60 - confidence) / 35, 0, 1) * 100 * 0.16 +
            stableRatio * 100 * 0.12;

        tuningProbability = clampNumber(tuningProbability * (0.65 + frameCountFactor * 0.35), 0, 95);
        lipSyncProbability = clampNumber(lipSyncProbability * (0.6 + frameCountFactor * 0.4), 0, 90);

        const roundedTuningProbability = Math.round(tuningProbability);
        const roundedLipSyncProbability = Math.round(lipSyncProbability);
        const maxProbability = Math.max(roundedTuningProbability, roundedLipSyncProbability);
        const level = getAdvisoryBand(maxProbability);
        const metrics = { score, median, p80, p95, stability, rate, confidence, stableRatio, evaluatedFrames };

        return {
            tuningProbability: roundedTuningProbability,
            lipSyncProbability: roundedLipSyncProbability,
            tuningClass: getProbabilityClass(tuningProbability),
            lipSyncClass: getProbabilityClass(lipSyncProbability),
            level,
            tuningNote: buildTuningNote(metrics, roundedTuningProbability),
            lipSyncNote: buildLipSyncNote(metrics, roundedLipSyncProbability),
            finalNote: L.advisoryFinal
        };
    }

    function centsToSuspicion(value, low, high) {
        const num = toNumber(value);
        return clampNumber((high - num) / Math.max(1, high - low), 0, 1) * 100;
    }

    function inverseSuspicion(value, low, high) {
        const num = toNumber(value);
        return clampNumber((high - num) / Math.max(1, high - low), 0, 1) * 100;
    }

    function getProbabilityClass(value) {
        if (value === undefined || value === null || value === '') return '';
        if (value >= 70) return 'score-low';
        if (value >= 30) return 'score-mid';
        return 'score-high';
    }

    function hasAdvisoryMetrics(data) {
        if (!data) return false;
        return ['median', 'p80', 'p95', 'stability', 'rate', 'confidence'].every(key => {
            const value = Number(data[key]);
            return Number.isFinite(value);
        });
    }

    function createEmptyAdvisory() {
        return {
            tuningProbability: '-',
            lipSyncProbability: '-',
            tuningClass: '',
            lipSyncClass: '',
            level: L.noFeature,
            tuningNote: tr('notes.tuningEmpty'),
            lipSyncNote: tr('notes.lipEmpty'),
            finalNote: L.advisoryFinal
        };
    }

    function renderAdvisoryNote(advisory) {
        const lines = [
            advisory.tuningNote,
            advisory.lipSyncNote,
            advisory.finalNote || advisory.note
        ].filter(Boolean);
        return lines.map(line => `<div class="advisory-note-line">${escapeHTML(line)}</div>`).join('');
    }

    function getAdvisoryBand(value) {
        if (value >= 70) return L.high;
        if (value >= 50) return L.medium;
        if (value >= 30) return L.mild;
        return L.noFeature;
    }

    function buildTuningNote(metrics, tuningProbability) {
        const band = getAdvisoryBand(tuningProbability);
        const stableRatioPercent = (metrics.stableRatio * 100).toFixed(1);

        if (LANG === 'en') {
            if (band === L.high) return `Tuning highly suspicious: median ${metrics.median} cents, P80 ${metrics.p80} cents, stability ${metrics.stability}, and perfect rate ${metrics.rate}% are unusually close to target pitch. Verify with waveform, spectrum, and original project files.`;
            if (band === L.medium) return `Tuning moderately suspicious: the main pitch distribution is concentrated, but listening review and the original track are still needed.`;
            if (band === L.mild) {
                if (metrics.median <= 10 && metrics.p80 > 20) return `Mild tuning attention: median deviation is ${metrics.median} cents, but P80 is ${metrics.p80} cents, so natural variation remains.`;
                return 'Mild tuning attention: some metrics look ideal, but they do not form a strong, stable low-deviation tuning pattern.';
            }
            if (metrics.p95 >= 35 || metrics.p80 >= 25) return `No obvious tuning feature: P80 is ${metrics.p80} cents and P95 is ${metrics.p95} cents, with natural variation or larger deviation frames.`;
            return 'No obvious tuning feature: current pitch statistics are not enough to support a tuning judgment.';
        }

        if (band === '高度可疑') {
            if (metrics.median <= 6 && metrics.p80 <= 12 && metrics.stability <= 5 && metrics.rate >= 90) {
                return `修音高度可疑：中位偏差${metrics.median}音分、P80偏差${metrics.p80}音分、稳定度${metrics.stability}、完美率${metrics.rate}%，多项指标同时高度贴近目标音。`;
            }
            if (metrics.median <= 8 && metrics.p80 <= 16 && metrics.stableRatio >= 0.85) {
                return `修音高度可疑：中位偏差${metrics.median}音分、P80偏差${metrics.p80}音分，稳定帧占比${stableRatioPercent}%，音高轨迹较集中。`;
            }
            return `修音高度可疑：音准偏差、稳定度和完美率组合偏理想，建议结合波形、频谱和原始工程核验。`;
        }

        if (band === '中度可疑') {
            if (metrics.median <= 8 && metrics.p80 <= 18 && metrics.rate >= 80) {
                return `修音中度可疑：中位偏差${metrics.median}音分、P80偏差${metrics.p80}音分、完美率${metrics.rate}%，主体音准较集中。`;
            }
            if (metrics.stability <= 7 && metrics.stableRatio >= 0.75) {
                return `修音中度可疑：稳定度${metrics.stability}偏低，稳定帧占比${stableRatioPercent}%，音高波动较少。`;
            }
            if (metrics.confidence < 45) {
                return `修音中度可疑，但检测可信度仅${metrics.confidence}%，建议谨慎解读。`;
            }
            return `修音中度可疑：主体音准较集中，但仍需结合听感和原始音轨判断。`;
        }

        if (band === '轻度关注') {
            if (metrics.median <= 10 && metrics.p80 > 20) {
                return `修音轻度关注：中位偏差${metrics.median}音分较低，但P80偏差${metrics.p80}音分仍显示部分自然波动，修音特征不强。`;
            }
            if (metrics.p95 >= 35) {
                return `修音轻度关注：P95偏差${metrics.p95}音分，存在较多大偏差帧，削弱了强修音判断。`;
            }
            if (metrics.rate >= 75 && metrics.stability > 10) {
                return `修音轻度关注：完美率${metrics.rate}%较高，但稳定度${metrics.stability}仍保留人声波动，修音依据有限。`;
            }
            return `修音轻度关注：部分指标较理想，但未形成稳定、集中、低偏差的强修音特征。`;
        }

        if (metrics.p95 >= 35 || metrics.p80 >= 25) {
            return `未见明显修音特征：P80偏差${metrics.p80}音分、P95偏差${metrics.p95}音分，存在较多自然波动或大偏差帧。`;
        }
        if (metrics.stability >= 12) {
            return `未见明显修音特征：稳定度${metrics.stability}，音高波动较明显。`;
        }
        return `未见明显修音特征：现有音高统计不足以支持修音判断。`;
    }

    function buildLipSyncNote(metrics, lipSyncProbability) {
        const band = getAdvisoryBand(lipSyncProbability);
        const stableRatioPercent = (metrics.stableRatio * 100).toFixed(1);

        if (LANG === 'en') {
            if (band === L.high) return `Lip-sync highly suspicious: score ${metrics.score}, perfect rate ${metrics.rate}%, and stability ${metrics.stability} may be too steady. Verify with mouth movement and live audio capture.`;
            if (band === L.medium) return 'Lip-sync moderately suspicious: some pitch metrics are unusually ideal; compare with video mouth movement and live sound source.';
            if (band === L.mild) {
                if (metrics.p95 >= 35) return `Mild lip-sync attention: P95 is ${metrics.p95} cents, with many large-deviation frames, so it does not support a strong lip-sync judgment.`;
                return 'Mild lip-sync attention: a few metrics deserve attention, but pitch data alone is insufficient.';
            }
            if (metrics.p80 >= 25 || metrics.p95 >= 35) return `No obvious lip-sync feature: P80 is ${metrics.p80} cents and P95 is ${metrics.p95} cents, showing natural pitch variation.`;
            return 'No obvious lip-sync feature: current pitch statistics alone are insufficient.';
        }

        if (band === '高度可疑') {
            if (metrics.score >= 92 && metrics.rate >= 90 && metrics.stability <= 5) {
                return `假唱高度可疑：综合得分${metrics.score}、完美率${metrics.rate}%、稳定度${metrics.stability}，表现过于稳定，需结合口型和现场收音核验。`;
            }
            if (metrics.median <= 6 && metrics.p80 <= 12 && metrics.stableRatio >= 0.9) {
                return `假唱高度可疑：中位偏差${metrics.median}音分、P80偏差${metrics.p80}音分、稳定帧占比${stableRatioPercent}%，音高轨迹高度集中。`;
            }
            return `假唱高度可疑：音高表现过于稳定或过于理想，但仍需结合现场画面、口型和原始音轨判断。`;
        }

        if (band === '中度可疑') {
            if (metrics.score >= 88 && metrics.rate >= 85 && metrics.stability <= 8) {
                return `假唱中度可疑：综合得分${metrics.score}、完美率${metrics.rate}%、稳定度${metrics.stability}，现场表现可能过于稳定。`;
            }
            if (metrics.confidence < 45 && metrics.rate >= 80) {
                return `假唱中度可疑：完美率${metrics.rate}%较高，但检测可信度仅${metrics.confidence}%，需结合现场收音核验。`;
            }
            if (metrics.stableRatio >= 0.85) {
                return `假唱中度可疑：稳定帧占比${stableRatioPercent}%，音高轨迹连续稳定。`;
            }
            return `假唱中度可疑：部分音高指标偏理想，建议结合视频口型和现场声源判断。`;
        }

        if (band === '轻度关注') {
            if (metrics.p95 >= 35) {
                return `假唱轻度关注：P95偏差${metrics.p95}音分，存在较多大偏差帧，不支持强假唱判断。`;
            }
            if (metrics.stability >= 10) {
                return `假唱轻度关注：稳定度${metrics.stability}，仍有明显人声波动，假唱依据有限。`;
            }
            if (metrics.rate < 80) {
                return `假唱轻度关注：完美率${metrics.rate}%未达到高度理想水平，假唱特征不强。`;
            }
            return `假唱轻度关注：存在少量可关注指标，但音高数据不足以支持假唱判断。`;
        }

        if (metrics.p80 >= 25 || metrics.p95 >= 35) {
            return `未见明显假唱特征：P80偏差${metrics.p80}音分、P95偏差${metrics.p95}音分，音高表现存在自然波动。`;
        }
        if (metrics.confidence >= 55 && metrics.stability >= 10) {
            return `未见明显假唱特征：检测可信度${metrics.confidence}%且稳定度${metrics.stability}，更接近自然演唱波动。`;
        }
        return `未见明显假唱特征：仅凭现有音高统计不足以支持假唱判断。`;
    }

    function formatMetricValue(value) {
        return value === undefined || value === null || value === '' ? '-' : value;
    }

    function formatPercentValue(value) {
        return value === '-' ? '-' : `${value}%`;
    }

    function localizeAnalysisError(errorMsg) {
        if (errorMsg === '音频过短，无法分析') return L.shortAudio;
        if (errorMsg === '未检测到有效人声') return L.noVoice;
        return errorMsg;
    }

    function renderStatBox(label, value, tip, valueClass = '', valueStyle = 'color:#475569;', boxClass = '') {
        return `
            <div class="stat-box ${escapeHTML(boxClass)}">
                <div class="stat-label">
                    ${escapeHTML(label)}
                    <span class="info-icon" tabindex="0" aria-label="${escapeHTML(tip)}" data-tip="${escapeHTML(tip)}">i</span>
                </div>
                <div class="stat-value ${escapeHTML(valueClass)}" style="${escapeHTML(valueStyle)}">${escapeHTML(value)}</div>
            </div>
        `;
    }

    function renderErrorCard(name, errorMsg) {
        resultsContainer.insertAdjacentHTML('beforeend', `
            <div class="result-item" style="border-left-color: var(--danger);">
                <h3>${escapeHTML(name)}</h3><p style="color: var(--danger); font-size: 13px;">❌ ${escapeHTML(errorMsg)}</p>
            </div>
        `);
    }

    document.getElementById('copyrightYear').textContent = new Date().getFullYear();
    renderCompareChart();
    renderNoDataAdvisory();
</script>
